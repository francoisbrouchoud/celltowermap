<div class="filters-panel" [class.collapsed]="isCollapsed">
  <div class="filters-header" (click)="isCollapsed = !isCollapsed">
    <div class="title-area">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/>
      </svg>
      <h2>Filtres</h2>
    </div>
    <div class="stats-badge">
      {{ visibleTowersCount | number }} / {{ totalTowersCount | number }}
    </div>
    <button class="toggle-btn" aria-label="Afficher/Masquer les filtres" (click)="$event.stopPropagation(); isCollapsed = !isCollapsed">
      <svg [class.rotated]="isCollapsed" viewBox="0 0 24 24" width="24" height="24">
        <path fill="currentColor" d="M7 10l5 5 5-5z"/>
      </svg>
    </button>
  </div>
  
  <div class="filters-body" *ngIf="!isCollapsed">
    <div class="filter-group">
      <h3>Opérateurs</h3>
      <div class="chips-container">
        <label *ngFor="let op of operators" 
               class="chip" 
               [class.active]="filters.operators[op]">
          <input type="checkbox" class="sr-only" [(ngModel)]="filters.operators[op]" (change)="applyFilters()">
          <span class="color-dot" [ngClass]="op.toLowerCase()"></span>
          {{ op }}
        </label>
      </div>
    </div>

    <div class="filter-group">
      <h3>Technologies</h3>
      <div class="chips-container">
        <label *ngFor="let tech of technologies" 
               class="chip" 
               [class.active]="filters.technologies[tech]">
          <input type="checkbox" class="sr-only" [(ngModel)]="filters.technologies[tech]" (change)="applyFilters()">
          {{ tech }}
        </label>
      </div>
    </div>

    <div class="filter-group">
      <h3>Puissance</h3>
      <div class="chips-container">
        <label *ngFor="let pow of powers" 
               class="chip" 
               [class.active]="filters.powers[pow.value]">
          <input type="checkbox" class="sr-only" [(ngModel)]="filters.powers[pow.value]" (change)="applyFilters()">
          {{ pow.label }}
        </label>
      </div>
    </div>
  </div>
</div>

<div id="map-container">
  <div id="map"></div>
</div>
