<div class="map-shell">
  <div class="map-title-card">
    <img src="favicon.svg" alt="" class="map-title-icon" />
    <h1>
      {{ pageTitle }}
      <span class="version-badge">v2</span>
  </h1>

  </div>

  <div class="filters-panel" [class.collapsed]="isCollapsed">
    <div class="filters-header" (click)="toggleFilters()">
      <div class="title-area">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path
            d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"
          />
        </svg>

        <h2>Filters</h2>
      </div>

      <div class="stats-badge">
        {{ visibleTowersCount | number }} / {{ totalTowersCount | number }}
      </div>

      <button
        class="toggle-btn"
        type="button"
        aria-label="Afficher ou masquer les filtres"
        (click)="$event.stopPropagation(); toggleFilters()"
      >
        <svg [class.rotated]="isCollapsed" viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M7 10l5 5 5-5z" />
        </svg>
      </button>
    </div>

    <div class="filters-body" *ngIf="!isCollapsed">
      <div class="filters-actions">
        <button type="button" class="reset-btn" (click)="resetFilters()">
          Reset All
        </button>
      </div>

      <div class="filter-group">
        <h3>Operators</h3>

        <div class="chips-container">
          <label
            *ngFor="let operator of operatorOptions"
            class="chip"
            [class.active]="filters.operators[operator.value]"
          >
            <input
              type="checkbox"
              class="sr-only"
              [(ngModel)]="filters.operators[operator.value]"
              (change)="applyFilters()"
            />

            <span class="color-dot" [ngClass]="operator.cssClass"></span>
            {{ operator.label }}
          </label>
        </div>
      </div>

      <div class="filter-group">
        <h3>Technology</h3>

        <div class="chips-container">
          <label
            *ngFor="let technology of technologyOptions"
            class="chip"
            [class.active]="filters.technologies[technology.value]"
          >
            <input
              type="checkbox"
              class="sr-only"
              [(ngModel)]="filters.technologies[technology.value]"
              (change)="applyFilters()"
            />

            {{ technology.label }}
          </label>
        </div>
      </div>

      <div class="filter-group">
        <h3>Environment</h3>

        <div class="chips-container">
          <label
            *ngFor="let type of typeOptions"
            class="chip"
            [class.active]="filters.types[type.value]"
          >
            <input
              type="checkbox"
              class="sr-only"
              [(ngModel)]="filters.types[type.value]"
              (change)="applyFilters()"
            />

            {{ type.label }}
          </label>
        </div>
      </div>

      <div class="filter-group">
        <h3>Power</h3>

        <div class="chips-container">
          <label
            *ngFor="let power of powerOptions"
            class="chip"
            [class.active]="filters.powers[power.value]"
          >
            <input
              type="checkbox"
              class="sr-only"
              [(ngModel)]="filters.powers[power.value]"
              (change)="applyFilters()"
            />

            {{ power.label }}
          </label>
        </div>
      </div>
    </div>
  </div>

  <div id="map-container">
    <div id="map"></div>
  </div>

  <div class="map-credits-card">
  <span>
    Data from
    <a [href]="ofcomUrl" target="_blank" rel="noopener noreferrer">OFCOM</a>
  </span>

  <span>, updated {{ sourceUpdatedLabel }}
  </span>

  <span>
    · Code on
    <a [href]="githubUrl" target="_blank" rel="noopener noreferrer">GitHub</a>
  under {{ licenseLabel }}
  </span>
</div>
</div>
